<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary of Self-Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a0f3c;
            --bg-secondary: #2c1a55;
            --accent: #b38aff;
            --text-primary: #e0d9ff;
            --text-secondary: #b39ddb;
            --success: #76ff03;
            --warning: #ff9800;
            --error: #ff1744;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Light Theme */
        body.theme-light {
            --bg-primary: #f5f3f7;
            --bg-secondary: #e8dff2;
            --accent: #7c3aed;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
        }

        /* Dark Yellow Theme */
        body.theme-dark-yellow {
            --bg-primary: #3d3000;
            --bg-secondary: #5c4a1a;
            --accent: #ffd700;
            --text-primary: #fff8dc;
            --text-secondary: #f0e68c;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Landing Screen */
        #landingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: var(--transition);
        }

        #landingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .landing-container {
            background: var(--bg-secondary);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(179, 138, 255, 0.2);
            text-align: center;
            max-width: 400px;
            border: 2px solid var(--accent);
        }

        .landing-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .landing-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--accent);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(179, 138, 255, 0.4);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(179, 138, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Main Dashboard */
        #dashboard {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        #dashboard.visible {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--accent);
        }

        .header-left h1 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .header-left p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .header-right {
            text-align: right;
        }

        .datetime-display {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Control Panel */
        .control-panel {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--accent);
            margin-bottom: 2rem;
        }

        .control-header {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .collapse-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .collapse-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .control-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-height: 500px;
            overflow: hidden;
            transition: var(--transition);
        }

        .control-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        button.primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        button.secondary {
            background: var(--bg-primary);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        button.secondary:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Analytics Cards */
        .analytics-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .analytics-card {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--accent);
            transition: var(--transition);
        }

        .analytics-card:hover {
            box-shadow: 0 8px 16px rgba(179, 138, 255, 0.2);
            transform: translateY(-4px);
        }

        .analytics-card h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .analytics-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .analytics-subtext {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .mini-chart {
            height: 60px;
            background: var(--bg-primary);
            border-radius: 4px;
            margin-top: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .chart-bar {
            position: absolute;
            bottom: 0;
            width: 8%;
            background: linear-gradient(180deg, var(--accent), rgba(179, 138, 255, 0.3));
            border-radius: 4px 4px 0 0;
        }

        /* Log Console */
        .log-console {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--accent);
            margin-bottom: 2rem;
        }

        .log-header {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .log-controls input {
            flex: 1;
            min-width: 150px;
        }

        .log-content {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border-left: 3px solid var(--accent);
            padding-left: 0.75rem;
            color: var(--text-secondary);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.trigger {
            border-left-color: var(--warning);
        }

        .log-entry.task {
            border-left-color: var(--success);
        }

        .log-entry.high-priority {
            border-left-color: var(--error);
            background: rgba(255, 23, 68, 0.1);
        }

        .log-timestamp {
            color: var(--accent);
            font-weight: 600;
            margin-right: 0.5rem;
        }

        /* AI Insight Panel */
        .ai-insights {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 2px solid var(--accent);
            margin-bottom: 2rem;
        }

        .ai-header {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ai-icon {
            font-size: 1.2rem;
        }

        .ai-suggestions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .suggestion-item {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
            transition: var(--transition);
        }

        .suggestion-item:hover {
            background: rgba(179, 138, 255, 0.1);
        }

        .suggestion-text {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .suggestion-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* Summary Card */
        .summary-card {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--accent);
            margin-bottom: 2rem;
        }

        .summary-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .summary-item {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }

        .summary-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 0.25rem;
        }

        /* Footer */
        .footer {
            background: var(--bg-secondary);
            padding: 1.5rem;
            text-align: center;
            border-top: 2px solid var(--accent);
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: var(--bg-secondary);
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(179, 138, 255, 0.3);
        }

        /* Counter Badges */
        .counter-badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .badge {
            background: var(--bg-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--accent);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge-value {
            font-weight: 700;
            color: var(--accent);
        }

        /* Filter Pills */
        .filter-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .pill {
            padding: 0.5rem 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .pill:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .pill.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #dashboard {
                padding: 1rem;
            }

            .header {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .header-right {
                text-align: left;
            }

            .landing-container {
                padding: 2rem;
                max-width: 90%;
            }

            .analytics-container {
                grid-template-columns: 1fr;
            }

            .theme-toggle {
                bottom: 1rem;
                right: 1rem;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(179, 138, 255, 0.8);
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Landing Screen -->
    <div id="landingScreen">
        <div class="landing-container">
            <div class="landing-title">🧠 Diary</div>
            <div class="landing-subtitle" data-i18n="landing.subtitle">Self-Analysis Journal</div>
            
            <div class="form-group">
                <label for="nicknameInput" data-i18n="landing.nickname">Nickname</label>
                <input type="text" id="nicknameInput" placeholder="Enter your nickname" maxlength="30">
            </div>

            <div class="form-group">
                <label for="languageSelect" data-i18n="landing.language">Language</label>
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                    <option value="uz">O'zbek</option>
                </select>
            </div>

            <button id="startBtn" class="primary" data-i18n="landing.start">Start</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🧠 <span id="appTitle">Diary of Self-Analysis</span></h1>
                <p id="headerDescription">Your personal self-analysis journal</p>
            </div>
            <div class="header-right">
                <div class="datetime-display" id="dateTimeDisplay">Loading...</div>
                <div>
                    <span class="status-indicator"></span>
                    <span id="statusText" data-i18n="header.focus">Focus Mode</span>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-header" onclick="toggleCollapse(this.parentElement)">
                <span data-i18n="panel.title">Control Panel</span>
                <span class="collapse-toggle">▼</span>
            </div>
            
            <div class="control-content">
                <div class="input-group">
                    <label for="taskInput" data-i18n="panel.task">Task Description</label>
                    <input type="text" id="taskInput" placeholder="Enter task..." maxlength="100">
                </div>

                <div class="input-group">
                    <label for="categorySelect" data-i18n="panel.category">Category</label>
                    <select id="categorySelect">
                        <option value="personal" data-i18n="category.personal">Personal</option>
                        <option value="work" data-i18n="category.work">Work</option>
                        <option value="learning" data-i18n="category.learning">Learning</option>
                        <option value="urgent" data-i18n="category.urgent">Urgent</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="prioritySelect" data-i18n="panel.priority">Priority</label>
                    <select id="prioritySelect">
                        <option value="low" data-i18n="priority.low">Low</option>
                        <option value="medium" data-i18n="priority.medium">Medium</option>
                        <option value="high" data-i18n="priority.high">High</option>
                    </select>
                </div>

                <div class="button-group">
                    <button id="submitTaskBtn" class="primary" data-i18n="panel.submit">Submit Task</button>
                    <button id="triggerBtn" class="secondary" data-i18n="panel.trigger">Trigger Event</button>
                    <button id="clearLogsBtn" class="secondary" data-i18n="panel.clear">Clear Logs</button>
                </div>
            </div>
        </div>

        <!-- Trigger Counters -->
        <div class="counter-badges" id="counterBadges"></div>

        <!-- Analytics Cards -->
        <div class="analytics-container" id="analyticsContainer"></div>

        <!-- AI Insights Panel -->
        <div class="ai-insights">
            <div class="ai-header">
                <span class="ai-icon">⚡</span>
                <span data-i18n="ai.title">AI Suggestions</span>
            </div>
            <div class="ai-suggestions" id="aiSuggestions"></div>
        </div>

        <!-- Summary Card -->
        <div class="summary-card">
            <div class="summary-title" data-i18n="summary.title">Today's Summary</div>
            <div class="summary-grid" id="summaryGrid"></div>
        </div>

        <!-- Log Console -->
        <div class="log-console">
            <div class="log-header" onclick="toggleCollapse(this.parentElement)">
                <span data-i18n="logs.title">System Log</span>
                <span class="collapse-toggle">▼</span>
            </div>
            
            <div class="log-controls">
                <input type="text" id="logSearch" placeholder="Search logs..." data-i18n-placeholder="logs.search">
                <select id="filterType">
                    <option value="">All Types</option>
                    <option value="trigger">Triggers</option>
                    <option value="task">Tasks</option>
                </select>
                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="personal">Personal</option>
                    <option value="work">Work</option>
                    <option value="learning">Learning</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>

            <div class="log-content" id="logContent"></div>
        </div>

        <!-- Export/Import Buttons -->
        <div class="button-group" style="margin-top: 2rem;">
            <button id="exportBtn" class="secondary" data-i18n="actions.export">Export Data</button>
            <button id="importBtn" class="secondary" data-i18n="actions.import">Import Data</button>
            <button id="undoBtn" class="secondary" data-i18n="actions.undo">Undo</button>
            <button id="redoBtn" class="secondary" data-i18n="actions.redo">Redo</button>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <button class="theme-btn" id="themeDefaultBtn" title="Dark Purple">🌙</button>
        <button class="theme-btn" id="themeLightBtn" title="Light">☀️</button>
        <button class="theme-btn" id="themeDarkYellowBtn" title="Dark Yellow">⭐</button>
    </div>

    <footer class="footer">
        <div>Diary of Self-Analysis v1.0.0 | <a href="https://github.com/m4zenin-max" target="_blank">GitHub</a></div>
    </footer>

    <!-- Hidden Import Input -->
    <input type="file" id="importFile" style="display: none;" accept=".json,.txt">

                },
                uz: {
                    'landing.subtitle': 'O\'z-o\'zini tahlil qilish jurnali',

                    'header.idle': 'Faollik rejimi',
                    'panel.title': 'Boshqaruv paneli',
                    'panel.task': 'Topshiriq tavsifi',
                    'panel.category': 'Kategoriya',
                    'panel.priority': 'Muhimlik darajasi',
                    'panel.submit': 'Topshiriqni yuborish',
                    'panel.trigger': 'Voqea jadalni bosh qilish',
                    'panel.clear': 'Loglarni tozalash',
                    'category.personal': 'Shaxsiy',
                    'category.work': 'Ish',
                    'category.learning': 'Ta\'lim',
                    'category.urgent': 'Shoshqaloq',
                    'priority.low': 'Past',
                    'priority.medium': 'O\'rta',
                    'priority.high': 'Yuqori',
                    'ai.title': 'AI Taklifflar',
                    'summary.title': 'Bugungi xulosa',
                    'logs.title': 'Tizim jurnali',
                    'logs.search': 'Loglarni qidirish...',
                    'actions.export': 'Chiqarish',
                    'actions.import': 'Kiritish',
                    'actions.undo': 'Bekor qilish',
                    'actions.redo': 'Qayta qilish',
                    'trigger.button': 'Tugma bosish',
                    'trigger.input': 'Matn kiritish',
                    'trigger.timer': 'Taimer',
                    'trigger.hover': 'Kursorni ko\'chirish',
                    'trigger.doubleclick': 'Ikki martta bosish',
                    'trigger.shortcut': 'Klaviatura tugmasi',
                    'summary.completed': 'Topshirilgan topshiriqlar',
                    'summary.pending': 'Kutayotgan topshiriqlar',
                    'summary.focus': 'Fokus soatlari',
                    'summary.productivity': 'Unumdorlik balli',
                }
            };

            // ============================================
            // State Management
            // ============================================
            let state = {
                nickname: '',
                language: 'en',
                tasks: [],
                triggers: [],
                logs: [],
                counters: {
                    button: 0,
                    input: 0,
                    timer: 0,
                    pageLoad: 0,
                    hover: 0,
                    doubleClick: 0,
                    shortcut: 0,
                    api: 0,
                    ai: 0
                },
                history: [],
                historyIndex: -1,
                lastActivityTime: Date.now(),
                isIdle: false,
                theme: 'dark-purple'
            };

            // ============================================
            // Utility Functions
            // ============================================
            const getTranslation = (key) => {
                return i18n[state.language][key] || key;
            };

            const formatTime = (date = new Date()) => {
                return date.toLocaleTimeString(state.language === 'en' ? 'en-US' : state.language === 'ru' ? 'ru-RU' : 'uz-UZ');
            };

            const formatDate = (date = new Date()) => {
                return date.toLocaleDateString(state.language === 'en' ? 'en-US' : state.language === 'ru' ? 'ru-RU' : 'uz-UZ');
            };

            const saveToLocalStorage = () => {
                localStorage.setItem('diaryState', JSON.stringify({
                    nickname: state.nickname,
                    language: state.language,
                    tasks: state.tasks,
                    triggers: state.triggers,
                    logs: state.logs,
                    counters: state.counters,
                    theme: state.theme
                }));
            };

            const loadFromLocalStorage = () => {
                const saved = localStorage.getItem('diaryState');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        Object.assign(state, data);
                        return true;
                    } catch (e) {
                        console.error('Error loading from localStorage:', e);
                        return false;
                    }
                }
                return false;
            };

            // ============================================
            // Logging System
            // ============================================
            const logEvent = (type, message, metadata = {}) => {
                const timestamp = new Date();
                const entry = {
                    id: Date.now(),
                    timestamp,
                    type,
                    message,
                    metadata,
                    category: metadata.category || 'general',
                    priority: metadata.priority || 'low'
                };

                state.logs.unshift(entry);
                if (state.logs.length > 200) state.logs.pop();

                renderLogs();
                saveToLocalStorage();

                // Trigger notifications for high-priority items
                if (entry.priority === 'high') {
                    notifyUser(`High Priority: ${message}`);
                }
            };

            const updateCounter = (counterName) => {
                if (state.counters.hasOwnProperty(counterName)) {
                    state.counters[counterName]++;
                    renderCounters();
                    saveToLocalStorage();
                }
            };

            // ============================================
            // Trigger Functions
            // ============================================
            const triggerButton = () => {
                updateCounter('button');
                logEvent('trigger', 'Button Trigger Executed', { category: 'trigger' });
            };

            const triggerInput = () => {
                updateCounter('input');
                logEvent('trigger', 'Input Trigger Executed', { category: 'trigger' });
            };

            const triggerTimer = () => {
                updateCounter('timer');
                logEvent('trigger', 'Timer Trigger Executed', { category: 'trigger' });
            };

            const triggerPageLoad = () => {
                updateCounter('pageLoad');
                logEvent('trigger', 'Page Load Trigger', { category: 'trigger' });
            };

            const triggerHover = () => {
                updateCounter('hover');
                logEvent('trigger', 'Hover Trigger Executed', { category: 'trigger' });
            };

            const triggerDoubleClick = () => {
                updateCounter('doubleClick');
                logEvent('trigger', 'Double Click Trigger Executed', { category: 'trigger' });
            };

            const triggerKeyShortcut = (key) => {
                updateCounter('shortcut');
                logEvent('trigger', `Keyboard Shortcut (${key}) Executed`, { category: 'trigger' });
            };

            const triggerAISuggestions = () => {
                updateCounter('ai');
                const suggestion = generateAISuggestion();
                logEvent('trigger', 'AI Suggestion Generated', { category: 'trigger' });
            };

            // ============================================
            // AI Suggestions System
            // ============================================
            const generateAISuggestion = () => {
                const suggestions = [
                    'Focus on high-priority tasks first to maximize productivity.',
                    'Take a 5-minute break to refresh your mind.',
                    'Review your completed tasks to celebrate progress.',
                    'Identify patterns in your work habits.',
                    'Plan tomorrow\'s most important task now.',
                    'Practice mindfulness for better focus.',
                    'Batch similar tasks together for efficiency.',
                    'Set clear, measurable goals for the day.'
                ];

                const suggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
                return {
                    id: Date.now(),
                    text: suggestion,
                    timestamp: new Date(),
                    priority: Math.random() > 0.5 ? 'high' : 'normal'
                };
            };

            // ============================================
            // Task Management
            // ============================================
            const submitTask = () => {
                const taskInput = document.getElementById('taskInput');
                const category = document.getElementById('categorySelect').value;
                const priority = document.getElementById('prioritySelect').value;

                if (!taskInput.value.trim()) {
                    alert('Please enter a task description');
                    return;
                }

                const task = {
                    id: Date.now(),
                    description: taskInput.value,
                    category,
                    priority,
                    completed: false,
                    createdAt: new Date()
                };

                state.tasks.unshift(task);
                logEvent('task', `Task added: ${task.description}`, {
                    category,
                    priority,
                    taskId: task.id
                });

                taskInput.value = '';
                updateHistory();
                renderAnalytics();
                generateAISuggestions();
                saveToLocalStorage();
            };

            // ============================================
            // Rendering Functions
            // ============================================
            const renderCounters = () => {
                const container = document.getElementById('counterBadges');
                container.innerHTML = '';

                Object.entries(state.counters).forEach(([type, count]) => {
                    if (count > 0) {
                        const badge = document.createElement('div');
                        badge.className = 'badge';
                        badge.innerHTML = `${type}: <span class="badge-value">${count}</span>`;
                        container.appendChild(badge);
                    }
                });
            };

            const renderLogs = () => {
                const logContent = document.getElementById('logContent');
                const searchTerm = document.getElementById('logSearch').value.toLowerCase();
                const typeFilter = document.getElementById('filterType').value;
                const categoryFilter = document.getElementById('filterCategory').value;

                let filtered = state.logs.filter(log => {
                    const matchesSearch = log.message.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || log.type === typeFilter;
                    const matchesCategory = !categoryFilter || log.category === categoryFilter;
                    return matchesSearch && matchesType && matchesCategory;
                });

                logContent.innerHTML = filtered.length === 0 
                    ? '<p style="color: var(--text-secondary); text-align: center; padding: 1rem;">No logs found</p>'
                    : filtered.map(log => `
                        <div class="log-entry ${log.type} ${log.priority === 'high' ? 'high-priority' : ''}">
                            <span class="log-timestamp">[${formatTime(new Date(log.timestamp))}]</span>
                            <strong>${log.type.toUpperCase()}</strong> - ${log.message}
                        </div>
                    `).join('');
            };

            const renderAnalytics = () => {
                const completedTasks = state.tasks.filter(t => t.completed).length;
                const totalTasks = state.tasks.length;
                const completionPercent = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
                const highPriorityTasks = state.tasks.filter(t => t.priority === 'high' && !t.completed).length;

                const triggerFrequency = Object.values(state.counters).reduce((a, b) => a + b, 0);
                const productivityScore = Math.min(100, completionPercent + (triggerFrequency % 20));

                const container = document.getElementById('analyticsContainer');
                container.innerHTML = `
                    <div class="analytics-card">
                        <h3>Task Completion</h3>
                        <div class="analytics-value">${completionPercent}%</div>
                        <div class="analytics-subtext">${completedTasks} of ${totalTasks} completed</div>
                        <div class="mini-chart">
                            <div class="chart-bar" style="height: ${completionPercent}%; left: 20%;"></div>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <h3>Priority Tasks</h3>
                        <div class="analytics-value">${highPriorityTasks}</div>
                        <div class="analytics-subtext">High priority pending</div>
                        <div class="mini-chart">
                            <div class="chart-bar" style="height: ${Math.min(100, highPriorityTasks * 20)}%; left: 20%;"></div>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <h3>Trigger Frequency</h3>
                        <div class="analytics-value">${triggerFrequency}</div>
                        <div class="analytics-subtext">Total triggers fired</div>
                        <div class="mini-chart">
                            <div class="chart-bar" style="height: ${Math.min(100, triggerFrequency / 10)}%; left: 20%;"></div>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <h3>Productivity Score</h3>
                        <div class="analytics-value">${productivityScore}</div>
                        <div class="analytics-subtext">Overall performance</div>
                        <div class="mini-chart">
                            <div class="chart-bar" style="height: ${productivityScore}%; left: 20%;"></div>
                        </div>
                    </div>
                `;
            };

            const generateAISuggestions = () => {
                const container = document.getElementById('aiSuggestions');
                const suggestions = [
                    generateAISuggestion(),
                    generateAISuggestion(),
                    generateAISuggestion()
                ];

                container.innerHTML = suggestions.map(s => `
                    <div class="suggestion-item">
                        <div class="suggestion-text">${s.text}</div>
                        <div class="suggestion-meta">Priority: ${s.priority}</div>
                    </div>
                `).join('');

                state.logs.splice(0, 0, {
                    id: Date.now(),
                    timestamp: new Date(),
                    type: 'ai',
                    message: 'AI Suggestions Updated',
                    category: 'ai',
                    priority: 'normal'
                });
            };

            const renderSummary = () => {
                const completedTasks = state.tasks.filter(t => t.completed).length;
                const pendingTasks = state.tasks.filter(t => !t.completed).length;
                const focusHours = Math.floor((Date.now() - state.lastActivityTime) / 3600000);
                const productivityScore = Math.min(100, (completedTasks * 10) + (state.counters.button % 30));

                document.getElementById('summaryGrid').innerHTML = `
                    <div class="summary-item">
                        <div class="summary-label">${getTranslation('summary.completed')}</div>
                        <div class="summary-value">${completedTasks}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">${getTranslation('summary.pending')}</div>
                        <div class="summary-value">${pendingTasks}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">${getTranslation('summary.focus')}</div>
                        <div class="summary-value">${focusHours}h</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">${getTranslation('summary.productivity')}</div>
                        <div class="summary-value">${productivityScore}%</div>
                    </div>
                `;
            };

            const updateLocalization = () => {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    el.textContent = getTranslation(el.getAttribute('data-i18n'));
                });

                document.getElementById('appTitle').textContent = `Diary of Self-Analysis - ${state.nickname}`;
                document.getElementById('headerDescription').textContent = 
                    state.language === 'en' ? 'Your personal self-analysis journal' :
                    state.language === 'ru' ? 'Ваш личный журнал самоанализа' :
                    'Sizning shaxsiy o\'z-tahlil jurnali';
            };

            // ============================================
            // History Management (Undo/Redo)
            // ============================================
            const updateHistory = () => {
                state.history = state.history.slice(0, state.historyIndex + 1);
                state.history.push(JSON.parse(JSON.stringify(state.tasks)));
                state.historyIndex++;

                if (state.history.length > 50) {
                    state.history.shift();
                    state.historyIndex--;
                }
            };

            const undo = () => {
                if (state.historyIndex > 0) {
                    state.historyIndex--;
                    state.tasks = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
                    logEvent('action', 'Undo executed');
                    renderAnalytics();
                    saveToLocalStorage();
                }
            };

            const redo = () => {
                if (state.historyIndex < state.history.length - 1) {
                    state.historyIndex++;
                    state.tasks = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
                    logEvent('action', 'Redo executed');
                    renderAnalytics();
                    saveToLocalStorage();
                }
            };

            // ============================================
            // Import/Export
            // ============================================
            const exportData = () => {
                const data = {
                    nickname: state.nickname,
                    language: state.language,
                    tasks: state.tasks,
                    logs: state.logs,
                    counters: state.counters,
                    exportDate: new Date().toISOString()
                };

                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diary-export-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);

                logEvent('action', 'Data exported');
            };

            const importData = () => {
                document.getElementById('importFile').click();
            };

            // ============================================
            // Theme Management
            // ============================================
            const setTheme = (theme) => {
                document.body.className = '';
                state.theme = theme;

                if (theme === 'light') {
                    document.body.classList.add('theme-light');
                } else if (theme === 'dark-yellow') {
                    document.body.classList.add('theme-dark-yellow');
                }

                saveToLocalStorage();
            };

            // ============================================
            // Notifications
            // ============================================
            const notifyUser = (message) => {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('Diary of Self-Analysis', {
                        body: message,
                        icon: '🧠'
                    });
                }
            };

            // ============================================
            // Auto-save
            // ============================================
            const autoSave = () => {
                setInterval(() => {
                    saveToLocalStorage();
                }, 10000);
            };

            // ============================================
            // Update DateTime Display
            // ============================================
            const updateDateTime = () => {
                const now = new Date();
                document.getElementById('dateTimeDisplay').textContent = 
                    `${formatDate(now)} ${formatTime(now)}`;
            };

            // ============================================
            // Idle Detection
            // ============================================
            const setupIdleDetection = () => {
                ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
                    document.addEventListener(event, () => {
                        state.lastActivityTime = Date.now();
                        state.isIdle = false;
                        document.getElementById('statusText').textContent = getTranslation('header.focus');
                    });
                });

                setInterval(() => {
                    const idleTime = Date.now() - state.lastActivityTime;
                    state.isIdle = idleTime > 300000; // 5 minutes
                    if (state.isIdle) {
                        document.getElementById('statusText').textContent = getTranslation('header.idle');
                    }
                }, 60000);
            };

            // ============================================
            // Event Listeners Setup
            // ============================================
            const setupEventListeners = () => {
                document.getElementById('startBtn').addEventListener('click', startApp);
                document.getElementById('submitTaskBtn').addEventListener('click', submitTask);
                document.getElementById('triggerBtn').addEventListener('click', triggerButton);
                document.getElementById('clearLogsBtn').addEventListener('click', () => {
                    if (confirm('Clear all logs?')) {
                        state.logs = [];
                        renderLogs();
                        logEvent('action', 'Logs cleared');
                    }
                });

                document.getElementById('exportBtn').addEventListener('click', exportData);
                document.getElementById('importBtn').addEventListener('click', importData);
                document.getElementById('undoBtn').addEventListener('click', undo);
                document.getElementById('redoBtn').addEventListener('click', redo);

                document.getElementById('themeDefaultBtn').addEventListener('click', () => setTheme('dark-purple'));
                document.getElementById('themeLightBtn').addEventListener('click', () => setTheme('light'));
                document.getElementById('themeDarkYellowBtn').addEventListener('click', () => setTheme('dark-yellow'));

                document.getElementById('logSearch').addEventListener('input', renderLogs);
                document.getElementById('filterType').addEventListener('change', renderLogs);
                document.getElementById('filterCategory').addEventListener('change', renderLogs);

                document.getElementById('languageSelect').addEventListener('change', (e) => {
                    state.language = e.target.value;
                    updateLocalization();
                    saveToLocalStorage();
                });

                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') submitTask();
                    triggerInput();
                });

                document.getElementById('importFile').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                state.tasks = data.tasks || [];
                                state.logs = data.logs || [];
                                state.counters = data.counters || state.counters;
                                renderAnalytics();
                                renderLogs();
                                renderCounters();
                                logEvent('action', 'Data imported');
                                saveToLocalStorage();
                            } catch (error) {
                                alert('Invalid import file');
                            }
                        };
                        reader.readAsText(file);
                    }
                });

                // Trigger examples
                document.addEventListener('dblclick', triggerDoubleClick);
                document.addEventListener('mouseover', (e) => {
                    if (e.target === document.body) triggerHover();
                }, { once: true });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'z') undo();
                    if (e.ctrlKey && e.key === 'y') redo();
                    if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportData(); }
                });

                triggerPageLoad();
            };

            // ============================================
            // Application Initialization
            // ============================================
            const startApp = () => {
                const nicknameInput = document.getElementById('nicknameInput').value.trim();
                if (!nicknameInput) {
                    alert('Please enter your nickname');
                    return;
                }

                state.nickname = nicknameInput;
                state.language = document.getElementById('languageSelect').value;

                saveToLocalStorage();
                transitionToDashboard();
            };

            const transitionToDashboard = () => {
                document.getElementById('landingScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.add('visible');

                updateLocalization();
                renderAnalytics();
                generateAISuggestions();
                renderSummary();
                renderCounters();
                renderLogs();
                updateDateTime();

                setInterval(updateDateTime, 1000);
                setupIdleDetection();

                if (state.theme !== 'dark-purple') {
                    setTheme(state.theme);
                }
            };

            const init = () => {
                setupEventListeners();
                
                if (loadFromLocalStorage() && state.nickname) {
                    document.getElementById('nicknameInput').value = state.nickname;
                    document.getElementById('languageSelect').value = state.language;
                    updateLocalization();
                    startApp();
                } else {
                    updateLocalization();
                }

                autoSave();
                requestNotificationPermission();
            };

            const requestNotificationPermission = () => {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            };

            // ============================================
            // Public API
            // ============================================
            return {
                init,
                logEvent,
                updateCounter,
                triggerButton,
                triggerInput,
                triggerTimer,
                triggerPageLoad,
                triggerHover,
                triggerDoubleClick,
                triggerKeyShortcut,
                triggerAISuggestions,
                submitTask,
                undo,
                redo,
                exportData,
                importData,
                setTheme
            };
        })();

        // ============================================
        // Global Utilities
        // ============================================
        function toggleCollapse(element) {
            const content = element.querySelector('.control-content, .log-content')?.parentElement.querySelector('.control-content, .log-content') ||
                            element.parentElement.querySelector('.control-content, .log-content');
            const toggle = element.querySelector('.collapse-toggle');

            if (content) {
                content.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
            }
        }

        // ============================================
        // Initialize Application on Load
        // ============================================
        window.addEventListener('DOMContentLoaded', DiaryApp.init);
    </script>
